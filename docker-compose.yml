services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bemyvoices
      POSTGRES_PASSWORD: bemyvoices
      POSTGRES_DB: bemyvoices
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bemyvoices -d bemyvoices"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://bemyvoices:bemyvoices@db:5432/bemyvoices
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  pgdata:
